<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة دراسة ريادة أعمال التقنية الحيوية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: slideDown 0.5s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        .tabs {
            display: flex;
            gap: 0;
            background: #f8f9fa;
            border-bottom: 2px solid #667eea;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .tab-btn.active {
            color: #667eea;
            background: white;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #667eea;
        }

        .content {
            padding: 30px;
            min-height: 400px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .question-title {
            font-weight: 600;
            font-size: 14px;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }

        .option label {
            cursor: pointer;
            font-size: 15px;
            color: #333;
            flex: 1;
        }

        .true-false {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .tf-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tf-btn:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .tf-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }

        .result.correct {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border-left: 4px solid #4CAF50;
        }

        .result.incorrect {
            background: rgba(244, 67, 54, 0.1);
            color: #F44336;
            border-left: 4px solid #F44336;
        }

        .flashcard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 40px 30px;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.8;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            transform: perspective(1000px) rotateY(0deg);
        }

        .flashcard:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .flashcard.flipped {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .flip-hint {
            position: absolute;
            bottom: 15px;
            font-size: 12px;
            opacity: 0.7;
        }

        .counter {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .reset-btn:hover {
            background: #da190b;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 20px;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
            
            .tab-btn {
                font-size: 13px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 أداة دراسة التقنية الحيوية</h1>
        <p>ريادة أعمال التقنية الحيوية - أسئلة تفاعلية</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0, event)">📝 اختيار متعدد</button>
            <button class="tab-btn" onclick="switchTab(1, event)">🎴 بطاقات تعليمية</button>
            <button class="tab-btn" onclick="switchTab(2, event)">✔️ صح/خطأ</button>
        </div>

        <div class="content">
            <!-- Multiple Choice Tab -->
            <div id="tab-0" class="tab-content active">
                <div class="progress-container">
                    <div class="counter" id="mc-counter"></div>
                    <div class="progress-bar"><div class="progress-fill" id="mc-progress"></div></div>
                </div>
                <div id="mc-container"></div>
            </div>

            <!-- Flashcard Tab -->
            <div id="tab-1" class="tab-content">
                <div class="counter" id="fc-counter"></div>
                <div id="fc-container"></div>
                <div class="button-group">
                    <button class="btn" onclick="prevCard()">⬅️ السابق</button>
                    <button class="btn" onclick="nextCard()">التالي ➡️</button>
                </div>
            </div>

            <!-- True/False Tab -->
            <div id="tab-2" class="tab-content">
                <div class="progress-container">
                    <div class="counter" id="tf-counter"></div>
                    <div class="progress-bar"><div class="progress-fill" id="tf-progress"></div></div>
                </div>
                <div id="tf-container"></div>
            </div>
        </div>
    </div>

    <script>
        const mcQuestions = [
            {
                q: "ما هي ريادة أعمال التقنية الحيوية؟",
                opts: [
                    "مجموع النشاطات اللازمة لبناء مشاريع تدمج بين تخصصات العلوم وريادة الأعمال",
                    "مجرد تطبيق التقنيات الحديثة في الصيدلة",
                    "إدارة مختبرات البحث فقط",
                    "بيع المنتجات الصيدلانية"
                ],
                correct: 0
            },
            {
                q: "كم عدد الشركات العاملة في مجال التقنية الحيوية عالمياً بعد أقل من 40 سنة؟",
                opts: [
                    "أقل من 1000 شركة",
                    "حوالي 5000 شركة",
                    "أكثر من 10000 شركة عامة وخاصة",
                    "حوالي 2000 شركة"
                ],
                correct: 2
            },
            {
                q: "ما هو الفرق بين المعروف المجهول والمجهول المجهول؟",
                opts: [
                    "المعروف المجهول: تدرك أنك لا تعرف، المجهول المجهول: لا تعرف أنك لا تعرف",
                    "لا يوجد فرق بينهما",
                    "كلاهما يعني الشيء ذاته",
                    "المجهول المجهول أقل خطورة"
                ],
                correct: 0
            },
            {
                q: "كم نسبة الشركات التي تفشل في السنوات الخمس الأولى؟",
                opts: [
                    "حوالي 20%",
                    "حوالي 50%",
                    "حوالي 75%",
                    "حوالي 10%"
                ],
                correct: 1
            },
            {
                q: "أي من العناصر التالية يعتبر أساسياً لتنمية تجمعات التقنية الحيوية؟",
                opts: [
                    "الأبحاث الأكاديمية عالية الجودة فقط",
                    "رأس المال البشري ذو الخبرة والتمويل وقوة العمل الماهرة والمرافق المتخصصة",
                    "التمويل فقط",
                    "الموقع الجغرافي فقط"
                ],
                correct: 1
            },
            {
                q: "ما متوسط الأجور في صناعة العلوم الحيوية مقارنة بالمتوسط الوطني؟",
                opts: [
                    "أقل من المتوسط الوطني",
                    "أعلى من المتوسط الوطني بـ 79%",
                    "مساوٍ للمتوسط الوطني",
                    "أعلى بـ 20% فقط"
                ],
                correct: 1
            },
            {
                q: "متى تأسست شركة Genentech؟",
                opts: [
                    "1973",
                    "1976",
                    "1980",
                    "1981"
                ],
                correct: 1
            },
            {
                q: "ما هي الخاصية الأساسية لراعي الأعمال الناجح؟",
                opts: [
                    "المال الكافي فقط",
                    "الشهادات العلمية العليا فقط",
                    "الشغف بعمله والقدرة على توصيل رؤيته وتحمل المسؤولية",
                    "العمل بمفرده دون فريق"
                ],
                correct: 2
            }
        ];

        const flashcards = [
            {
                front: "تعريف ريادة الأعمال في التقنية الحيوية",
                back: "مجموع النشاطات اللازمة لبناء مشاريع تدمج بين العلوم وريادة الأعمال، وابتكار وتطوير ومنتجات التقنية الحيوية وتسويقها"
            },
            {
                front: "الفروقات الرئيسية بين ريادة الأعمال العامة والتقنية الحيوية",
                back: "الفرق في الوقت والمال: التقنية الحيوية تحتاج أضعاف الوقت والمال. المتطلبات القانونية صارمة. غموض المعلومات والبيانات العلمية"
            },
            {
                front: "ما هو رأس المال البشري في التجمعات؟",
                back: "الأفراد ذوو الخبرة والكفاءة لرعاية الشركات: رواد أعمال متسلسلون وقيادات من الشركات الصيدلانية والأجهزة الطبية والزراعية"
            },
            {
                front: "العنصر الأول من العناصر الخمسة الأساسية",
                back: "وفرة الأبحاث الأكاديمية عالية الجودة والممولة بشكل جيد ومستمر في مؤسسات علمية مرموقة"
            },
            {
                front: "العنصر الثالث من العناصر الخمسة الأساسية",
                back: "إمكانية الوصول إلى مصادر التمويل ورأس المال الجريء في المراحل المبكرة (مستثمرون ملائكيون ورأس مال استثماري)"
            },
            {
                front: "خصائص الريادي الناجح الـ 10",
                back: "الشغف، توصيل الرؤية، إلهام الآخرين، عدم الخوف من المخاطر المحسوبة، تحمل المسؤولية، التواضع والتعلم، التفاؤل، المثابرة، تعدد المهام، إدارة الأموال"
            },
            {
                front: "ما هو المستثمر الملائكي؟",
                back: "شخص ثري يقدم رأس المال للشركات الناشئة غالباً مقابل سندات قابلة للتحويل أو حصص في المشروع، يستثمر ماله الخاص"
            },
            {
                front: "مناطق تجمعات التقنية الحيوية الرائدة عالمياً",
                back: "منطقة خليج سان فرانسيسكو ومنطقة بوسطن/كامبريدج، تشهدان أفضل نمو وتركيز أعلى لشركات التقنية الحيوية"
            }
        ];

        const tfQuestions = [
            { q: "تحتاج مشاريع التقنية الحيوية إلى وقت وأموال أقل من المشاريع التقليدية", ans: false },
            { q: "المستثمر الملائكي يستثمر أموال الآخرين وليس أمواله الخاصة", ans: false },
            { q: "الخوف من المخاطر هو صفة مهمة لراعي الأعمال الناجح", ans: false },
            { q: "شركة Genentech تأسست عام 1976", ans: true },
            { q: "الفشل في البداية يعني الفشل النهائي للشركة", ans: false },
            { q: "متوسط أجور التقنية الحيوية أقل من المتوسط الوطني", ans: false },
            { q: "المعروف المجهول أخطر من المجهول المجهول", ans: false },
            { q: "التجمعات الصناعية تحتاج إلى وفرة من الأبحاث الأكاديمية الممولة", ans: true }
        ];

        let currentMC = 0, currentFC = 0, currentTF = 0;
        let mcAnswers = {}, tfAnswers = {}, fcFlipped = {};

        function switchTab(idx, event) {
            event.preventDefault();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + idx).classList.add('active');
            event.target.classList.add('active');
            
            if (idx === 0) renderMC();
            if (idx === 1) renderFC();
            if (idx === 2) renderTF();
        }

        function renderMC() {
            const q = mcQuestions[currentMC];
            let html = `<div class="question-card">
                <div class="question-title">السؤال ${currentMC + 1} من ${mcQuestions.length}</div>
                <div class="question-text">${q.q}</div>
                <div class="options">`;
            q.opts.forEach((opt, i) => {
                const checked = mcAnswers[currentMC] === i ? 'checked' : '';
                html += `<label class="option">
                    <input type="radio" name="mc-opt" value="${i}" ${checked} onchange="selectMC(${i})">
                    <label>${opt}</label>
                </label>`;
            });
            html += `</div>`;
            if (mcAnswers[currentMC] !== undefined) {
                const isCorrect = mcAnswers[currentMC] === q.correct;
                html += `<div class="result ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✓ إجابة صحيحة!' : '✗ إجابة غير صحيحة'}</div>`;
            }
            html += `<div class="button-group">
                <button class="btn" onclick="prevMC()" ${currentMC === 0 ? 'disabled' : ''}>⬅️ السابق</button>
                <button class="btn" onclick="nextMC()" ${currentMC === mcQuestions.length - 1 ? 'disabled' : ''}>التالي ➡️</button>
            </div></div>`;
            document.getElementById('mc-container').innerHTML = html;
            document.getElementById('mc-counter').innerText = `${currentMC + 1} من ${mcQuestions.length}`;
            document.getElementById('mc-progress').style.width = ((currentMC + 1) / mcQuestions.length * 100) + '%';
        }

        function selectMC(idx) { mcAnswers[currentMC] = idx; renderMC(); }
        function prevMC() { if (currentMC > 0) { currentMC--; renderMC(); } }
        function nextMC() { if (currentMC < mcQuestions.length - 1) { currentMC++; renderMC(); } }

        function renderFC() {
            const card = flashcards[currentFC];
            const flipped = fcFlipped[currentFC];
            document.getElementById('fc-container').innerHTML = `
                <div class="flashcard ${flipped ? 'flipped' : ''}" onclick="flipFC()">
                    <div>${flipped ? card.back : card.front}</div>
                    <div class="flip-hint">اضغط للقلب</div>
                </div>`;
            document.getElementById('fc-counter').innerText = `${currentFC + 1} من ${flashcards.length}`;
        }

        function flipFC() { fcFlipped[currentFC] = !fcFlipped[currentFC]; renderFC(); }
        function prevCard() { if (currentFC > 0) { currentFC--; renderFC(); } }
        function nextCard() { if (currentFC < flashcards.length - 1) { currentFC++; renderFC(); } }

        function renderTF() {
            const q = tfQuestions[currentTF];
            let html = `<div class="question-card">
                <div class="question-title">السؤال ${currentTF + 1} من ${tfQuestions.length}</div>
                <div class="question-text">${q.q}</div>
                <div class="true-false">
                    <button class="tf-btn ${tfAnswers[currentTF] === true ? 'selected' : ''}" onclick="selectTF(true)">✓ صح</button>
                    <button class="tf-btn ${tfAnswers[currentTF] === false ? 'selected' : ''}" onclick="selectTF(false)">✗ خطأ</button>
                </div>`;
            if (tfAnswers[currentTF] !== undefined) {
                const isCorrect = tfAnswers[currentTF] === q.ans;
                html += `<div class="result ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✓ إجابة صحيحة!' : '✗ إجابة غير صحيحة'}</div>`;
            }
            html += `<div class="button-group">
                <button class="btn" onclick="prevTF()" ${currentTF === 0 ? 'disabled' : ''}>⬅️ السابق</button>
                <button class="btn" onclick="nextTF()" ${currentTF === tfQuestions.length - 1 ? 'disabled' : ''}>التالي ➡️</button>
            </div></div>`;
            document.getElementById('tf-container').innerHTML = html;
            document.getElementById('tf-counter').innerText = `${currentTF + 1} من ${tfQuestions.length}`;
            document.getElementById('tf-progress').style.width = ((currentTF + 1) / tfQuestions.length * 100) + '%';
        }

        function selectTF(val) { tfAnswers[currentTF] = val; renderTF(); }
        function prevTF() { if (currentTF > 0) { currentTF--; renderTF(); } }
        function nextTF() { if (currentTF < tfQuestions.length - 1) { currentTF++; renderTF(); } }

        renderMC();
    </script>
</body>
</html>
